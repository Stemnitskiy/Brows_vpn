name: Test

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go test ./...
      - run: go vet ./...

  extension-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --check extension/background.js
      - run: node --check extension/options.js
      - run: node --check extension/popup.js
      - run: node --check extension/diagnostics.js
      - run: node --check extension/onboarding.js
      - run: node --check extension/theme.js
      - run: node --check extension/validators.js
      - run: node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json', 'utf8'))"
      - run: node scripts/extension-identity.js verify
      - run: |
          if git ls-files '*.pem' 'secrets/*.pem' | grep -q .; then
            echo 'Tracked PEM files are not allowed'
            git ls-files '*.pem' 'secrets/*.pem'
            exit 1
          fi
      - run: |
          if git archive HEAD | tar -t | grep -E '\.pem$'; then
            echo 'Clean git archive must not contain PEM files'
            exit 1
          fi
      - run: node scripts/generate-extension-icons.js
      - run: node scripts/validate-extension-assets.js
      - run: node scripts/test-pac-whitelist.js
      - run: node scripts/test-settings-import-export.js
      - run: npm audit --omit=dev --audit-level=moderate
        working-directory: extension

  windows-preflight:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\check-env.ps1 -Ci
      - run: powershell -NoProfile -ExecutionPolicy Bypass -File .\make-clean-archive.ps1 -Mode git -OutputPath dist\ci-clean.zip
