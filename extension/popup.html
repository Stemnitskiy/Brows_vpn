<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brows VPN</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
      margin: 0;
    }
    
    .header {
      text-align: center;
      margin-bottom: 15px;
    }
    
    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #333;
    }
    
    .status {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      text-align: center;
    }
    
    .status.disabled {
      background-color: #ffebee;
      color: #c62828;
    }
    
    .status.enabled {
      background-color: #e8f5e9;
      color: #2e7d32;
    }
    
    .button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .button.primary {
      background-color: #4285f4;
      color: white;
    }
    
    .button.primary:hover {
      background-color: #3367d6;
    }
    
    .button.secondary {
      background-color: #f1f1f1;
      color: #333;
    }
    
    .button.secondary:hover {
      background-color: #e0e0e0;
    }
    
    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Brows VPN</h1>
  </div>
  
  <div class="status disabled" id="status">
    <span id="statusText">VPN Disabled</span>
  </div>
  
  <button class="button primary" id="enableBtn">Enable VPN</button>
  <button class="button secondary" id="settingsBtn">Settings</button>
  
  <div class="footer">
    Brows VPN v1.0.0
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
